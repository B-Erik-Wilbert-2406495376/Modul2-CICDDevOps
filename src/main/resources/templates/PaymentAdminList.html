<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Admin</title>
</head>
<body>

<h2>All Payments</h2>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Method</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="payment : ${payments}">

        <td th:text="${payment.id}"></td>

        <td th:text="${payment.method}"></td>

        <td th:text="${payment.status}"></td>

        <td>
            <a th:href="@{/payment/admin/detail/{id}(id=${payment.id})}">
                Detail
            </a>
        </td>

    </tr>

</table>

</body>
</html>
